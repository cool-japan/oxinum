# Defensive nextest defaults for OxiNum.
#
# Background: a Farey-sequence infinite-loop bug in oxinum-rational caused
# 6 parallel test processes to each consume 7-16 GB before OOM killed them.
# These defaults cap parallelism and force termination of any test that
# fails to make progress within a bounded time window.

[profile.default]
# Cap parallel test processes. Default is num-cpus; this is conservative
# enough to keep memory pressure bounded on a typical dev machine.
test-threads = 4

# A test that doesn't report progress for `period` is marked "slow".
# After `terminate-after` consecutive slow periods, nextest sends SIGTERM.
# 60s x 2 = 120s before forced termination -- long enough for legitimate
# heavy property tests, short enough to catch infinite loops fast.
slow-timeout = { period = "60s", terminate-after = 2 }

# Visibility for slow tests in the live output.
status-level = "pass"
final-status-level = "slow"

[profile.ci]
# Tighter CI defaults.
retries = 0
test-threads = 2
slow-timeout = { period = "30s", terminate-after = 2 }
final-status-level = "slow"
